<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${tituloPagina}"></title>
    <link rel="stylesheet" th:href="@{/styles/style.css}">
</head>
<body>
<div class="container">
    <div class="logo">
        <img th:src="@{/img/senac-logo.png}" alt="Logo Senac">
    </div>
    <div class="card">
        <h1 th:text="${tituloPagina}"></h1>
        <p th:text="${subTituloPagina}"></p>

        <!-- Mensagem de erro -->
        <div class="erro" th:if="${erro}" th:text="${erro}"></div>

        <form th:action="@{/login}" th:object="${UsuarioForm}" method="post">

            <label for="email">E-mail</label>
            <input
                    type="email"
                    id="email"
                    th:field="*{email}"
                    placeholder="Digite seu e-mail"
                    required
            >

            <label for="senha">Senha</label>
            <input
                    type="password"
                    id="senha"
                    th:field="*{senha}"
                    placeholder="Digite sua senha"
                    required
            >

            <button type="submit">Entrar</button>

        </form>

        <div class="links">
            <a th:href="@{/alterarSenha}">Esqueceu a senha?</a>
            <a th:href="@{/cadastro}">Criar conta</a>
        </div>
    </div>
</div>
<script th:src="@{/scripts/script.js}"></script>
</body>
</html>
